version: '3.8'

services:
  yunlailai:
    build: .
    container_name: yunlailai-server
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=sqlite://./data/db/yunlailai.db
      - STORAGE_PROVIDER=local
      - STORAGE_LOCAL_PATH=./data/files
    restart: unless-stopped